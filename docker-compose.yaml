version: '3.9'
services:
    app:
        user: "1000:1000"
        build:
            context: ./
            dockerfile: Dockerfile
        ports:
            - "8081:80"
        volumes:
            - .:/var/www/html
        depends_on:
            - db
        environment:
            TZ: Europe/Prague
    db:
        image: postgres:latest
        container_name: postgres
        restart: always
        environment:
            POSTGRES_DB: dev
            POSTGRES_USER: test
            POSTGRES_PASSWORD: test
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data

volumes:
    pgdata: